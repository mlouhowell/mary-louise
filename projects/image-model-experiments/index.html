  <script>
    (function () {
      try {
        const saved = sessionStorage.getItem('ml-settings');
        if (!saved) return;
        const s = JSON.parse(saved);
        const root = document.documentElement;
        const _mob = window.innerWidth <= 800;
        Object.entries(s).forEach(([k, v]) => { if (_mob && k === '--pad-page-h') return; root.style.setProperty(k, v); });

    })();
