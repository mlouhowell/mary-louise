<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Howell — Experiments</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Inter+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-work:         #CC6FAD;
      --color-about:        #4E9AC3;
      --color-experiments:  #F1DFC1;
      --color-project-bg:   #FFFFFF;
      --color-triangle:     #C8341A;

      --font-body:    'Inter', system-ui, sans-serif;
      --font-display: 'Inter Display', 'Inter', system-ui, sans-serif;

      --size-h1:   40px;
      --size-h2:   24px;
      --size-h3:   20px;
      --size-body: 16px;
      --size-nav:  20px;

      --pad-page-h:   80px;
      --pad-page-v:   56px;
      --gap-section:  48px;
      --gap-cols:     80px;
      --triangle-size: 440px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background-color: #010101;
      min-height: 100vh;
      color: #1A1A1A;
      overflow-x: hidden;
    }

    .page {
      position: fixed;
      top: 40px;
      bottom: 40px;
      left: 0;
      right: 0;
      max-width: 1200px;
      margin: 0 auto;
      background-color: var(--color-experiments);
      overflow: hidden;
    }

    .page-inner {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: none;
      padding: var(--pad-page-v) var(--pad-page-h);
      display: flex;
      flex-direction: column;
    }

    .page-inner::-webkit-scrollbar { display: none; }

    .header {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: var(--gap-cols);
      align-items: flex-start;
      margin-bottom: var(--gap-section);
    }

    h1 {
      font-family: var(--font-display);
      font-size: var(--size-h1);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 48px;
      max-width: 640px;
    }

    h2 {
      font-family: var(--font-body);
      font-size: var(--size-h2);
      font-weight: 600;
      line-height: 32px;
      color: #1A1A1A;
    }

    h3 {
      font-family: var(--font-body);
      font-size: var(--size-h3);
      font-weight: 600;
      line-height: 24px;
      color: rgba(0,0,0,0.6);
    }

    nav {
      display: flex;
      flex-direction: column;
      text-align: left;
      padding-top: 6px;
      gap: 8px;
    }

    nav a {
      font-family: var(--font-body);
      font-size: var(--size-nav);
      font-weight: 600;
      color: #010101;
      text-decoration: none;
      text-transform: uppercase;
      line-height: 24px;
      transition: opacity 0.15s;
    }

    nav a.active { text-decoration: underline wavy #C8341A; text-underline-offset: 4px; }
    nav a:hover  { color: #C8341A; opacity: 1; }

    .grid {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: var(--gap-cols);
      flex: 1;
      align-content: start;
    }

    .experiment-item { display: flex; flex-direction: column; gap: 10px; }

    .experiment-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .experiment-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .experiment-thumb-placeholder {
      font-size: 13px;
      color: rgba(0,0,0,0.3);
      letter-spacing: 0.04em;
    }

    .experiment-label { font-size: var(--size-body); line-height: 24px; }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 40px;
      margin-top: 48px;
      flex-wrap: wrap;
      gap: 16px;
    }

    footer span,
    footer a {
      font-size: 12px;
      color: #010101;
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: #1A1A1A; }
    .footer-links  { display: flex; gap: 20px; }

    .page-turn {
      position: absolute;
      bottom: 0;
      right: 0;
      width: var(--triangle-size);
      height: var(--triangle-size);
      display: block;
      cursor: pointer;
      z-index: 100;
      text-decoration: none;
    }
    .page-turn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 50%, #010101 50%);
    }
    .page-turn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--color-triangle) 50%, transparent 50%);
      transition: opacity 0.15s;
    }
    .page-turn:hover::after { opacity: 0.8; }

    @media (max-width: 800px) {
      :root {
        --size-h1:   28px;
        --size-h2:   20px;
        --size-h3:   17px;
        --size-body: 15px;
        --pad-page-h: 24px;
        --size-nav: 16px;
        --triangle-size: 140px;
      }
      .grid { grid-template-columns: 1fr; }

    }
  </style>
</head>
<body>

  <div class="page">
    <div class="page-inner">
    <div class="header">
      <h1>I like to experiment with image models, build my own apps, and I'm always playing with new tools</h1>
      <nav>
        <a href="/">Work</a>
        <a href="/about/">About</a>
        <a href="/experiments/" class="active">Experiments</a>
      </nav>
    </div>

    <div class="grid">

      <div class="experiment-item">
        <div class="experiment-thumb">
          <!-- Replace with Scribe app screenshot -->
          <span class="experiment-thumb-placeholder">Scribe app</span>
        </div>
        <h3 class="experiment-label">Scribe — voice note tool</h3>
      </div>

      <div class="experiment-item">
        <div class="experiment-thumb">
          <!-- Replace with hummingbird illustration -->
          <span class="experiment-thumb-placeholder">Hummingbird</span>
        </div>
        <h3 class="experiment-label">Image model experiments</h3>
      </div>

      <div class="experiment-item">
        <div class="experiment-thumb">
          <!-- Replace with CarPlay UI screenshot -->
          <span class="experiment-thumb-placeholder">CarPlay UI</span>
        </div>
        <h3 class="experiment-label">CarPlay concept</h3>
      </div>

    </div>

    <footer>
      <span>2026 © ML Howell V1.1</span>
      <div class="footer-links">
        <a href="mailto:marylouisehowell@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/marylouisehowell/" target="_blank">LinkedIn</a>
        <a href="https://twitter.com/marlouiise" target="_blank">X</a>
        <a href="#" target="_blank">Resume</a>
      </div>
    </footer>
    </div><!-- /.page-inner -->
    <a href="/" class="page-turn" aria-label="Back to Work"></a>
  </div>

  <script src="/settings-widget.js?v=2"></script>
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('ml-settings');
        if (!saved) return;
        const s = JSON.parse(saved);
        const root = document.documentElement;
        Object.entries(s).forEach(([k, v]) => root.style.setProperty(k, v));
      } catch (e) {}
    })();
  </script>

</body>
</html>
