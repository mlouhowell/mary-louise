<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/Icons/Shamrock.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Howell — Experiments</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Inter+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-work:         #CC6FAD;
      --color-about:        #4E9AC3;
      --color-experiments:  #F1DFC1;
      --color-project-bg:   #FFFFFF;
      --color-triangle:     #C8341A;
      --color-text:         #1A1A1A;
      --color-muted:        rgba(0,0,0,0.4);
      --color-subtle:       rgba(0,0,0,0.13);
      --color-pill-bg:      rgba(0,0,0,0.08);

      --font-body:    'Inter', system-ui, sans-serif;
      --font-display: 'Inter Display', 'Inter', system-ui, sans-serif;

      --size-h1:   40px;
      --size-h2:   24px;
      --size-h3:   20px;
      --size-body: 16px;
      --size-nav:  20px;

      --pad-page-h:   80px;
      --pad-page-v:   56px;
      --gap-section:  48px;
      --gap-cols:     80px;
      --triangle-size: 180px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background-color: var(--color-experiments);
      min-height: 100vh;
      color: var(--color-text);
      overflow-x: hidden;
    }

    .page {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 1200px;
      margin: 0 auto;
      background-color: var(--color-experiments);
      overflow: hidden;
    }

    .page-inner {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: none;
      padding: var(--pad-page-v) var(--pad-page-h);
      display: flex;
      flex-direction: column;
    }

    .page-inner::-webkit-scrollbar { display: none; }

    .header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap-cols);
      align-items: flex-start;
      margin-bottom: var(--gap-section);
    }

    .header h1 {
      grid-column: 1 / 3;
    }

    h1 {
      font-family: var(--font-display);
      font-size: var(--size-h1);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.05;
      max-width: 640px;
    }

    h2 {
      font-family: var(--font-body);
      font-size: var(--size-h2);
      font-weight: 600;
      line-height: 1.35;
      color: var(--color-text);
    }

    h3 {
      font-family: var(--font-body);
      font-size: var(--size-h3);
      font-weight: 600;
      line-height: 1.2;
      color: var(--color-text);
    }

    nav {
      display: flex;
      flex-direction: column;
      text-align: left;
      padding-top: 6px;
      gap: 8px;
    }

    nav a {
      font-family: var(--font-body);
      font-size: var(--size-h3);
      font-weight: 600;
      color: var(--color-text);
      text-decoration: none;
      line-height: 1.2;
      transition: opacity 0.15s;
    }

    nav a.active { text-decoration: underline; text-underline-offset: 3px; }
    nav a:hover  { color: #C8341A; }

    .grid {
      columns: 3;
      column-gap: var(--gap-cols);
      flex: 1;
    }

    .experiment-item {
      display: flex;
      flex-direction: column;
      break-inside: avoid;
      margin-bottom: 52px;
    }

    .experiment-thumb {
      width: 100%;
      background: rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .experiment-thumb img {
      width: 100%;
      height: auto;
      display: block;
    }

    .experiment-thumb-placeholder {
      font-size: 13px;
      color: rgba(0,0,0,0.3);
      letter-spacing: 0.04em;
      padding: 40px;
    }

    .experiment-meta {
      padding: 10px 0 13px;
      border-bottom: 1px solid var(--color-subtle);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meta-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .meta-name {
      font-family: var(--font-body);
      font-size: var(--size-body);
      font-weight: 500;
      color: var(--color-text);
      line-height: 1.3;
    }

    .meta-arrow {
      font-size: 13px;
      color: var(--color-muted);
      flex-shrink: 0;
      line-height: 1.4;
    }

    .meta-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meta-date {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      color: var(--color-muted);
    }

    .meta-pill {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--color-muted);
      background: var(--color-pill-bg);
      padding: 2px 6px;
      border-radius: 3px;
      line-height: 1.6;
    }

    footer {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding-top: 40px;
      margin-top: 48px;
      flex-wrap: wrap;
      gap: 16px;
      column-gap: 20px;
    }

    footer span,
    footer a {
      font-size: 12px;
      color: var(--color-text);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { opacity: 0.6; }
    .footer-links  { display: flex; gap: 20px; }

    /* ── Experiment cards ────────────────────────────── */
    .experiment-item {
      cursor: pointer;
    }
    .experiment-item:hover .experiment-thumb {
      opacity: 0.85;
    }
    .experiment-item:hover .meta-name {
      color: #C8341A;
    }
    .meta-name { transition: color 0.15s; }
    .experiment-item:focus-visible {
      outline: 2px solid #1A1A1A;
      outline-offset: 3px;
    }
    .experiment-thumb { transition: opacity 0.15s; }

    /* ── Modal ───────────────────────────────────────── */
    .exp-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .exp-modal.is-open { display: flex; }

    .exp-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
    }

    .exp-modal-panel {
      position: relative;
      background: #fff;
      width: 100%;
      max-width: 880px;
      max-height: 92vh;
      overflow-y: auto;
      margin: 24px;
      scrollbar-width: none;
    }
    .exp-modal-panel::-webkit-scrollbar { display: none; }

    .exp-modal-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0D0D0D;
      opacity: 0.35;
      transition: opacity 0.15s;
      z-index: 1;
      padding: 0;
    }
    .exp-modal-close:hover { opacity: 1; }
    .exp-modal-close svg { width: 16px; height: 16px; }

    .exp-modal-img {
      width: 100%;
      height: auto;
      display: block;
      background: #F4F4F4;
    }

    .exp-modal-body {
      padding: 40px 56px 56px;
    }

    .exp-modal-title {
      font-family: var(--font-display);
      font-size: var(--size-h1);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: #0D0D0D;
      margin-bottom: 16px;
    }

    .exp-modal-desc {
      font-size: var(--size-body);
      line-height: 1.6;
      color: #0D0D0D;
      margin-bottom: 24px;
    }
    .exp-modal-desc:empty { display: none; }

    .exp-modal-link {
      display: inline-block;
      font-size: var(--size-body);
      color: #0D0D0D;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity 0.15s;
    }
    .exp-modal-link:hover { opacity: 0.55; }
    .exp-modal-link[hidden] { display: none; }

    @media (max-width: 800px) {
      .exp-modal { align-items: flex-end; }
      .exp-modal-panel {
        margin: 0;
        max-width: 100%;
        max-height: 88vh;
      }
      .exp-modal-body { padding: 28px 24px 40px; }
      .exp-modal-title { font-size: var(--size-h2); }
    }

    @media (max-width: 800px) {
      :root {
        --size-h1:   28px;
        --size-h2:   20px;
        --size-h3:   17px;
        --size-body: 15px;
        --pad-page-h: 16px;
        --size-nav: 16px;
        --triangle-size: 72px;
      }
      .header { grid-template-columns: 1fr; gap: var(--gap-section); }
      .grid   { columns: 1; column-gap: 0; }
    }
  </style>
</head>
<body>

  <script src="/settings-widget.js?v=45"></script>
  <script>
    (function () {
      try {
        const saved = sessionStorage.getItem('ml-settings');
        if (!saved) return;
        const s = JSON.parse(saved);
        const root = document.documentElement;
        const _mob = window.innerWidth <= 800;
        Object.entries(s).forEach(([k, v]) => { if (_mob && k === '--pad-page-h') return; root.style.setProperty(k, v); });
        const hex = (s['--color-experiments'] || '#F1DFC1').trim();
        function lum(h) {
          h = h.replace('#','');
          if (h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
          const r=parseInt(h.slice(0,2),16)/255, g=parseInt(h.slice(2,4),16)/255, b=parseInt(h.slice(4,6),16)/255;
          const l=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);
          return 0.2126*l(r)+0.7152*l(g)+0.0722*l(b);
        }
        const L=lum(hex);
        const isLight = 1.05/(L+0.05) >= (L+0.05)/0.0606;
        root.style.setProperty('--color-text',    isLight ? '#FFFFFF' : '#1A1A1A');
        root.style.setProperty('--color-muted',   isLight ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.4)');
        root.style.setProperty('--color-subtle',  isLight ? 'rgba(255,255,255,0.2)'  : 'rgba(0,0,0,0.13)');
        root.style.setProperty('--color-pill-bg', isLight ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.08)');
      } catch (e) {}
    })();
  </script>

  <script>
    (function () {
      const EXPERIMENTS = {
        'movie-club': {
          title: 'Movie Club Posters',
          desc:  '',
          img:   'images/Movie%20club.jpeg',
          alt:   'Movie Club Posters',
          link:  null,
        },
        'pixel-art': {
          title: 'Pixel Art Icon Set',
          desc:  '',
          img:   'images/Icon_set.png',
          alt:   'Pixel art icon set',
          link:  null,
        },
      };

      const modal      = document.getElementById('exp-modal');
      const panel      = modal.querySelector('.exp-modal-panel');
      const backdrop   = modal.querySelector('.exp-modal-backdrop');
      const closeBtn   = modal.querySelector('.exp-modal-close');
      const modalImg   = modal.querySelector('.exp-modal-img');
      const modalTitle = modal.querySelector('.exp-modal-title');
      const modalDesc  = modal.querySelector('.exp-modal-desc');
      const modalLink  = modal.querySelector('.exp-modal-link');

      let prevFocus = null;
      let scrollTop = 0;

      function openModal(slug, push) {
        const data = EXPERIMENTS[slug];
        if (!data) return;

        modalImg.src             = data.img;
        modalImg.alt             = data.alt;
        modalTitle.textContent   = data.title;
        modalDesc.textContent    = data.desc;
        if (data.link) {
          modalLink.href         = data.link;
          modalLink.textContent  = 'View project ↗';
          modalLink.removeAttribute('hidden');
        } else {
          modalLink.setAttribute('hidden', '');
        }

        scrollTop = document.querySelector('.page-inner')?.scrollTop || 0;
        document.body.style.overflow = 'hidden';
        prevFocus = document.activeElement;

        modal.classList.add('is-open');
        modal.removeAttribute('aria-hidden');
        closeBtn.focus();

        if (push) history.pushState({ slug }, '', '#' + slug);
      }

      function closeModal(push) {
        if (!modal.classList.contains('is-open')) return;
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        const pi = document.querySelector('.page-inner');
        if (pi) pi.scrollTop = scrollTop;
        if (prevFocus) prevFocus.focus();
        if (push) history.pushState({}, '', location.pathname);
      }

      // Focus trap
      panel.addEventListener('keydown', function (e) {
        if (e.key !== 'Tab') return;
        const focusable = panel.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])');
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
        }
      });

      // Card clicks + keyboard
      document.querySelectorAll('.experiment-item[data-slug]').forEach(function (item) {
        item.addEventListener('click', function () { openModal(item.dataset.slug, true); });
        item.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(item.dataset.slug, true); }
        });
      });

      // Close triggers
      closeBtn.addEventListener('click',   function () { closeModal(true); });
      backdrop.addEventListener('click',   function () { closeModal(true); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal(true);
      });

      // Back / forward button
      window.addEventListener('popstate', function () {
        const slug = location.hash.slice(1);
        if (slug && EXPERIMENTS[slug]) openModal(slug, false);
        else closeModal(false);
      });

      // Direct link on load
      const initSlug = location.hash.slice(1);
      if (initSlug && EXPERIMENTS[initSlug]) openModal(initSlug, false);
    })();
  </script>
